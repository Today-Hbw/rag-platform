[project]
name = "rag-core"
version = "0.1.0"
description = "rag-platform 共享底座：settings/db/embedding/vectorstore/契约/权限/清洗/分块。"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2",
    "pydantic-settings>=2",
    "pymysql>=1.1",
    "qdrant-client>=1.8",
    "httpx>=0.25",
    "requests>=2.31",
    "Pillow>=10",
]

[project.optional-dependencies]
# 附件文本提取重依赖，按需安装（Linux 容器只装需要的）
pdf = ["pdfplumber", "pdf2image"]
office = ["python-docx", "openpyxl", "python-pptx", "xlrd", "olefile"]
ocr = ["pytesseract"]
# 仅 Windows 装 pywin32；Linux 下 .doc 走 antiword/LibreOffice/OLE 兜底
win = ["pywin32; sys_platform == 'win32'"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_core"]
