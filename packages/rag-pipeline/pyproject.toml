[project]
name = "rag-pipeline"
version = "0.1.0"
description = "离线批处理：数据源 connector + 下载 / 清洗 / 向量化。"
requires-python = ">=3.10"
dependencies = [
    "rag-core[pdf,office,ocr]",
    "requests>=2.31",
]

[project.scripts]
rag-pipeline = "rag_pipeline.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_pipeline"]
