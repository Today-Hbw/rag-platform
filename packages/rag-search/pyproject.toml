[project]
name = "rag-search"
version = "0.1.0"
description = "在线检索服务：FastAPI + 向量/BM25/标题 RRF 混合检索 + Redis 缓存 + 权限过滤。"
requires-python = ">=3.10"
dependencies = [
    "rag-core",
    "fastapi>=0.104",
    "uvicorn[standard]>=0.24",
    "redis>=5",
]

[project.scripts]
rag-search = "rag_search.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_search"]
