[project]
name = "rag-mcp"
version = "0.1.0"
description = "rag-platform 的 MCP 客户端：把远程检索服务封装成 MCP 工具。"
requires-python = ">=3.10"
# 刻意零 rag-core 依赖，保持可独立发布（可从子目录发 PyPI）。
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.25",
]

[project.scripts]
rag-mcp = "rag_mcp.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_mcp"]
